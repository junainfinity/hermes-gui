<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hermes — Web App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app/styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/store.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>
  <script type="text/babel" src="app/cmdk.jsx"></script>
  <script type="text/babel" src="app/page-home.jsx"></script>
  <script type="text/babel" src="app/page-chat.jsx"></script>
  <script type="text/babel" src="app/pages-rest.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const api = useStoreSetup();

      // global ⌘K / esc
      React.useEffect(() => {
        function onKey(e) {
          if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); api.openCmd(); }
          else if (e.key === 'Escape' && api.state.commandOpen) { api.closeCmd(); }
          else if ((e.ctrlKey) && e.key === 'b' && !e.metaKey) { e.preventDefault(); api.toggleVoice(); }
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [api]);

      // simulate bg task progress
      React.useEffect(() => {
        const t = setInterval(() => {
          api.set((s) => ({
            ...s,
            bgTasks: s.bgTasks.map(bg => bg.status === 'running'
              ? { ...bg, progress: Math.min(100, bg.progress + Math.random() * 3), elapsed: bg.elapsed + 2, status: bg.progress >= 98 ? 'done' : 'running' }
              : bg),
          }));
        }, 2000);
        return () => clearInterval(t);
      }, []);

      const route = api.state.route.name;

      return (
        <StoreCtx.Provider value={api}>
          <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: 'var(--paper-1)' }}>
            <TopBar />
            <main style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              {route === 'home'       && <HomePage />}
              {route === 'chat'       && <ChatPage />}
              {route === 'sessions'   && <SessionsPage />}
              {route === 'skills'     && <SkillsPage />}
              {route === 'background' && <BackgroundPage />}
              {route === 'settings'   && <SettingsPage />}
            </main>
            <StatusBar />
            {api.state.commandOpen && <CommandPalette />}
            <Toast />
          </div>
        </StoreCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
