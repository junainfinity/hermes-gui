<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Hermes Web GUI — Wireframe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Dark mode toggle pill */
    #tweak {
      position: fixed; bottom: 16px; right: 16px; z-index: 50;
      background: var(--paper); border: 1.5px solid var(--line);
      border-radius: 999px; padding: 8px 14px;
      font-family: "Architects Daughter", system-ui, sans-serif;
      font-size: 13px; color: var(--ink);
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 18px -8px rgba(0,0,0,.3);
    }
    #tweak .tgl {
      width: 30px; height: 16px; border-radius: 8px;
      background: var(--paper-3); border: 1.5px solid var(--line);
      position: relative; cursor: pointer;
    }
    #tweak .tgl::after {
      content: ''; position: absolute; top: 1px; left: 1px;
      width: 11px; height: 11px; border-radius: 50%; background: var(--ink-2);
      transition: left .15s;
    }
    #tweak.on .tgl { background: var(--accent); border-color: var(--accent); }
    #tweak.on .tgl::after { left: 14px; background: #fff; }

    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

    /* title header for the canvas */
    .wf-title {
      position: absolute; top: -46px; left: 0;
      font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700;
      color: var(--ink-2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- tweaks toggle -->
  <div id="tweak" onclick="this.classList.toggle('on'); document.body.classList.toggle('dark', this.classList.contains('on')); localStorage.setItem('hermes-wf-dark', this.classList.contains('on') ? '1' : '0');">
    <span>dark</span>
    <div class="tgl"></div>
  </div>
  <script>
    if (localStorage.getItem('hermes-wf-dark') === '1') {
      document.body.classList.add('dark');
      document.getElementById('tweak').classList.add('on');
    }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="approach-a1.jsx"></script>
  <script type="text/babel" src="approach-a2.jsx"></script>
  <script type="text/babel" src="approach-a3.jsx"></script>
  <script type="text/babel" src="approach-a4.jsx"></script>

  <script type="text/babel">
    function Intro() {
      return (
        <div style={{ padding: '40px 60px', maxWidth: 720, background: 'var(--paper)', border: '1.5px solid var(--line-soft)', borderRadius: 4 }}>
          <div style={{ fontFamily: 'Caveat', fontSize: 42, fontWeight: 700, lineHeight: 1, marginBottom: 10 }}>
            Hermes — web GUI wireframes
          </div>
          <div style={{ fontSize: 14, color: 'var(--ink-2)', lineHeight: 1.6, fontFamily: 'Architects Daughter, system-ui' }}>
            Four rough takes on turning the Hermes CLI into a modern web app.
            Every layout covers the same surface — <b>chat, sessions, skills, settings, background tasks, status bar, slash palette, tool stream, voice</b> — but arranges them differently to explore how "power-user TUI" translates to a browser without carrying the terminal aesthetic.
            <br /><br />
            <b>A1</b> is the ChatGPT-style baseline — familiar sidebar, center chat, context rail.
            <b> A2</b> makes the command palette the front door — "launcher" energy.
            <b> A3</b> is IDE-style — session tabs, split chat + tool stream + inspector.
            <b> A4</b> is a dashboard/hub — sessions & skills laid out as cards with a permanent background-task pane.
            <br /><br />
            <span style={{ color: 'var(--ink-3)' }}>
              Click an artboard title or the ⤢ expand button to view fullscreen. Drag the ⠿ grip to reorder. Toggle dark in the bottom right.
            </span>
          </div>
          <div style={{ marginTop: 18, display: 'flex', gap: 8, flexWrap: 'wrap', fontSize: 12 }}>
            <span className="pill"><Ic k="chat" size={11} /> chat</span>
            <span className="pill"><Ic k="clock" size={11} /> sessions</span>
            <span className="pill"><Ic k="skill" size={11} /> skills</span>
            <span className="pill"><Ic k="cog" size={11} /> settings</span>
            <span className="pill"><Ic k="bolt" size={11} /> background</span>
            <span className="pill"><Ic k="slash" size={11} /> slash palette</span>
            <span className="pill"><Ic k="tool" size={11} /> tool stream</span>
            <span className="pill"><Ic k="voice" size={11} /> voice</span>
            <span className="pill"><Ic k="dollar" size={11} /> status bar</span>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="intro" title="Hermes Web GUI — Wireframe" subtitle="B&W + one accent · sketchy · 4 approaches">
            <DCArtboard id="intro-note" label="intro · read me first" width={760} height={420}>
              <div style={{ padding: 20, width: '100%', height: '100%', boxSizing: 'border-box', background: 'var(--paper)' }}>
                <Intro />
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection id="approaches" title="Layout approaches" subtitle="Same surface area, four structural directions. Click any to focus.">
            <DCArtboard id="a1" label="A1 · Classic chat — sidebar + center + rail" width={1200} height={720}>
              <ApproachA1 />
            </DCArtboard>
            <DCArtboard id="a2" label="A2 · Spotlight — command-palette first" width={1200} height={720}>
              <ApproachA2 />
            </DCArtboard>
            <DCArtboard id="a3" label="A3 · Workspace — session tabs + split panes" width={1200} height={820}>
              <ApproachA3 />
            </DCArtboard>
            <DCArtboard id="a4" label="A4 · Dashboard — sessions & skills hub" width={1200} height={820}>
              <ApproachA4 />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
